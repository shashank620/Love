<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      text-align: center;
      /* Romantic background image */
      background: url('https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=1600&auto=format&fit=crop') no-repeat center center/cover;
    }

    /* Soft overlay for readability */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 240, 245, 0.6);
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 26px;
      color: #b00020;
      margin-top: 20px;
      display: none;
      text-shadow: 1px 1px 4px rgba(255,255,255,0.7);
    }

    .rose {
      position: absolute;
      font-size: 20px;
      animation: float 4s linear infinite;
      z-index: 2;
    }

    @keyframes float {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-800px) rotate(360deg);
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 20px;
      }
      button {
        font-size: 16px;
        padding: 12px 25px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <button onclick="showLove()">Click Me ❤️</button>
    <h1 id="message">I LOVE YOU SUSHMITA ♾️</h1>
  </div>

  <script>
    function showLove() {
      document.getElementById('message').style.display = 'block';
      createRoses();
    }

    function createRoses() {
      for (let i = 0; i < 30; i++) {
        let rose = document.createElement('div');
        rose.className = 'rose';
        rose.innerHTML = '🌹';

        rose.style.left = Math.random() * 100 + 'vw';
        rose.style.top = '100vh';
        rose.style.animationDuration = (Math.random() * 3 + 2) + 's';
        rose.style.fontSize = (Math.random() * 20 + 15) + 'px';

        document.body.appendChild(rose);

        setTimeout(() => {
          rose.remove();
        }, 4000);
      }
    }
  </script>
</body>
</html>
